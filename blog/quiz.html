    <div class="q-text">${q.q}</div>
    <div class="options-grid">
      ${q.options.map((o, i) => `
        <button class="opt-btn" onclick="selectOption('${o.country}', this)">
          <span class="opt-emoji">${o.emoji}</span>
          ${o.text.replace(/\n/g, '<br>')}
        </button>
      `).join('')}
    </div>
  `;
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  card.offsetHeight; // reflow
  card.style.animation = '';
  card.innerHTML = html;
}

function selectOption(country, btn) {
  // 선택 애니메이션
  document.querySelectorAll('.opt-btn').forEach(b => b.disabled = true);
  btn.classList.add('selected');
  scores[country] += 1;

  setTimeout(() => {
    currentQ++;
    if (currentQ < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 380);
}

function showResult() {
  const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
  const r = results[winner];

  document.getElementById('result-card-wrap').innerHTML = `
    <div class="result-card" style="background: ${r.bg}; color: #fff;">
      <span class="result-flag">${r.flag}</span>
      <div class="result-country-name">${r.name}</div>
      <div class="result-title">"${r.title}"</div>
      <div class="result-desc">${r.desc}</div>
      <div class="result-style-badge" style="background:${r.badge.bg}; color:${r.badge.color}">
        ${r.style}
      </div>
      <button class="btn-share btn-share-copy" onclick="shareResult('${winner}')">
        🔗 결과 공유하기
      </button>
      <button class="btn-retry" onclick="startQuiz()">↩ 다시 하기</button>
    </div>
    <div style="text-align:center; margin-top:16px;">
      <a href="index.html" style="color:#888; font-size:0.85rem;">← 블로그 목록으로</a>
    </div>
  `;
  showScreen('result');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function shareResult(country) {
  const r = results[country];
  const url = 'https://www.dreamingblog.com/blog/quiz.html';
  const shareText = `⚽ 나는 ${r.flag} ${r.name} 스타일!\n"${r.title}"\n${r.style}\n\n나의 2026 월드컵 축구 성향 테스트 👇\n${url}`;

  if (navigator.share) {
    navigator.share({ title: '나는 어느 나라 축구 스타일?', text: shareText, url })
      .catch(() => doCopy(shareText));
  } else {
    doCopy(shareText);
  }
}

function doCopy(text) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(showToast)
      .catch(() => legacyCopy(text));
  } else {
    legacyCopy(text);
  }
}

function legacyCopy(text) {
  const el = document.createElement('textarea');
  el.value = text;
  el.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0';
  document.body.appendChild(el);
  el.focus();
  el.select();
  const ok = document.execCommand('copy');
  document.body.removeChild(el);
  if (ok) {
    showToast();
  } else {
    prompt('아래 링크를 복사해서 공유하세요! 👇', text);
  }
}

function showToast() {
  const t = document.getElementById('share-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
</body>
</html>
