    .predict-btn.draw-btn { font-size: 0.8rem; }
    .predict-btn:disabled { cursor: default; opacity: 0.7; }
    .predict-btn .btn-flag { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .predict-btn .btn-label { font-size: 0.75rem; opacity: 0.8; }

    .score-section {
      background: #0d0d1a;
      border-radius: 12px;

      margin-bottom: 16px;

      margin-bottom: 10px;
    }
    .score-inputs {
      display: flex;
      align-items: center;
      justify-content: center;

    .score-input {
      width: 56px;
      height: 48px;

      border: 1.5px solid #2a2a4a;
      border-radius: 10px;
      color: #fff;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      outline: none;

    .score-input:focus { border-color: #f4c842; }
    .score-input.invalid { border-color: #e63946; }
    .score-colon { font-size: 1.6rem; color: #555; font-weight: 700; }
    .score-hint {
      text-align: center;
      font-size: 0.78rem;
      margin-top: 8px;
      min-height: 1.2em;

    .btn-submit {

      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;

    /* 결과 바 */
    .result-section { margin-top: 4px; }
    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .result-title { color: #f4c842; font-size: 0.88rem; font-weight: 700; }
    .result-count { color: #888; font-size: 0.8rem; }

    .result-row { margin-bottom: 12px; }
    .result-row-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;

    .bar-bg {
      background: #0d0d1a;
      border-radius: 99px;

      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.8s ease;

    .bar-fill.draw { background: #555; }
    .bar-fill.away { background: linear-gradient(90deg, #4a9eff, #0066cc); }

    .my-vote-badge {
      display: inline-block;
      background: #f4c842;

      font-size: 0.7rem;

    .top-score {

      background: #0d0d1a;
      border-radius: 10px;

    }
    .top-score span { color: #f4c842; font-weight: 700; }

    .share-row {
      display: flex;

    .btn-share-sm {
      flex: 1;

    @media (max-width: 400px) {
      .team-flag { font-size: 2.4rem; }

<script>
// ─── 경기 데이터 ───────────────────────────────────────────
const MATCHES = [
  {
    id: "korea-rsa-r3",
    group: "A조 3라운드",
    dateKST: "6월 25일 (목) 오전 10:00 KST",
    venue: "에스타디오 아크론 · 과달라하라",
    home: { flag: "🇰🇷", name: "대한민국" },
    away: { flag: "🇿🇦", name: "남아공" },
    deadlineUTC: "2026-06-25T01:00:00Z",  // 예측 마감 (경기 시작)
    note: "⚠️ 무승부 이상이면 한국 16강 확정!"
  },
  {
    id: "mexico-czech-r3",
    group: "A조 3라운드",
    dateKST: "6월 25일 (목) 오전 10:00 KST",
    venue: "에스타디오 BBVA · 몬테레이",
    home: { flag: "🇲🇽", name: "멕시코" },
    away: { flag: "🇨🇿", name: "체코" },
    deadlineUTC: "2026-06-25T01:00:00Z",
    note: "멕시코는 이미 16강 확정 — 체코의 마지막 도전"
  }
];

// ─── CountAPI 투표 저장 ────────────────────────────────────
// 무료 카운터 API — 별도 설정 불필요
const NS = "wc2026hub-v2";

async function getVotes(matchId) {
  try {
    const [h, d, a] = await Promise.all([
      fetch(`https://api.countapi.xyz/get/${NS}/${matchId}-home`).then(r => r.json()),
      fetch(`https://api.countapi.xyz/get/${NS}/${matchId}-draw`).then(r => r.json()),
      fetch(`https://api.countapi.xyz/get/${NS}/${matchId}-away`).then(r => r.json()),
    ]);
    return {
      home: Math.max(0, h.value || 0),
      draw: Math.max(0, d.value || 0),
      away: Math.max(0, a.value || 0)
    };
  } catch {
    return { home: 0, draw: 0, away: 0 };
  }
}

async function castVote(matchId, outcome) {
  try {
    await fetch(`https://api.countapi.xyz/hit/${NS}/${matchId}-${outcome}`);
  } catch {}
}

// ─── localStorage 투표 기록 ───────────────────────────────
function getMyVote(matchId) {
  return localStorage.getItem(`predict_${matchId}`);
}
function setMyVote(matchId, data) {
  localStorage.setItem(`predict_${matchId}`, JSON.stringify(data));
}
function parseMyVote(matchId) {
  try { return JSON.parse(getMyVote(matchId)); } catch { return null; }
}

// ─── 퍼센트 계산 ──────────────────────────────────────────
function calcPct(votes) {
  const total = votes.home + votes.draw + votes.away;
  if (total === 0) return { home: 33, draw: 34, away: 33, total: 0 };
  return {
    home: Math.round((votes.home / total) * 100),
    draw: Math.round((votes.draw / total) * 100),
    away: Math.round((votes.away / total) * 100),
    total
  };
}

// ─── 마감 여부 ────────────────────────────────────────────
function isClosed(deadlineUTC) {
  return new Date() >= new Date(deadlineUTC);
}

// ─── 카드 렌더 ────────────────────────────────────────────
function renderCard(m, votes, myVote) {
  const closed = isClosed(m.deadlineUTC);
  const showResults = myVote || closed;
  const pct = calcPct(votes);
  const voted = myVote ? myVote.outcome : null;

  const outcomeLabel = { home: `${m.home.name} 승`, draw: "무승부", away: `${m.away.name} 승` };

  return `
  <div class="match-card ${myVote ? 'voted' : ''}" id="card-${m.id}">
    <div class="match-badge">
      <span>${m.group}</span>
      ${closed
        ? `<span class="badge-closed">🔒 예측 마감</span>`
        : `<span style="color:#4caf50">🟢 예측 참여중</span>`}
    </div>
    <div class="match-body">
      <div class="vs-row">
        <div class="team-block">
          <span class="team-flag">${m.home.flag}</span>
          <div class="team-name">${m.home.name}</div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="team-block">
          <span class="team-flag">${m.away.flag}</span>
          <div class="team-name">${m.away.name}</div>
        </div>
      </div>
      <div class="match-info">
        <strong>${m.dateKST}</strong><br>
        ${m.venue}<br>
        <span style="color:#f4c842; font-size:0.78rem">${m.note}</span>
      </div>

      ${showResults ? renderResults(m, pct, voted, myVote) : renderVoteForm(m, closed)}
    </div>
  </div>`;
}

function renderVoteForm(m, closed) {
  return `
    <div class="predict-btns">
      <button class="predict-btn" onclick="selectPick('${m.id}', 'home', this)" ${closed ? 'disabled' : ''}>
        <span class="btn-flag">${m.home.flag}</span>
        ${m.home.name} 승
        <span class="btn-label">홈팀 승리</span>
      </button>
      <button class="predict-btn draw-btn" onclick="selectPick('${m.id}', 'draw', this)" ${closed ? 'disabled' : ''}>
        🤝<br>무승부
      </button>
      <button class="predict-btn" onclick="selectPick('${m.id}', 'away', this)" ${closed ? 'disabled' : ''}>
        <span class="btn-flag">${m.away.flag}</span>
        ${m.away.name} 승
        <span class="btn-label">원정팀 승리</span>
      </button>
    </div>

    <div class="score-section">
      <label>🎯 스코어 예측 (선택)</label>
      <div class="score-inputs">
        <span style="font-size:1.2rem">${m.home.flag}</span>
        <input class="score-input" type="number" min="0" max="20" placeholder="0" id="sh-${m.id}" oninput="onScoreInput('${m.id}','home',this)">
        <span class="score-colon">:</span>
        <input class="score-input" type="number" min="0" max="20" placeholder="0" id="sa-${m.id}" oninput="onScoreInput('${m.id}','away',this)">
        <span style="font-size:1.2rem">${m.away.flag}</span>
      </div>
      <p class="score-hint" id="score-hint-${m.id}"></p>
    </div>

    <button class="btn-submit" id="submit-${m.id}" onclick="submitVote('${m.id}')" disabled>
      예측 제출하기
    </button>`;
}

function renderResults(m, pct, voted, myVote) {
  const total = pct.total;
  const scoreText = (myVote && myVote.scoreHome !== '' && myVote.scoreAway !== '')
    ? `<div class="top-score">내 스코어 예측: <span>${m.home.flag} ${myVote.scoreHome} : ${myVote.scoreAway} ${m.away.flag}</span></div>`
    : '';

  return `
    <div class="result-section">
      <div class="result-header">
        <span class="result-title">📊 실시간 예측 현황</span>
        <span class="result-count">${total > 0 ? total + '명 참여' : '첫 번째로 예측해보세요!'}</span>
      </div>

      <div class="result-row">
        <div class="result-row-label">
          <span>${m.home.flag} ${m.home.name} 승 ${voted === 'home' ? '<span class="my-vote-badge">내 예측</span>' : ''}</span>
          <span class="pct">${pct.home}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct.home}%"></div></div>
      </div>

      <div class="result-row">
        <div class="result-row-label">
          <span>🤝 무승부 ${voted === 'draw' ? '<span class="my-vote-badge">내 예측</span>' : ''}</span>
          <span class="pct">${pct.draw}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill draw" style="width:${pct.draw}%"></div></div>
      </div>

      <div class="result-row">
        <div class="result-row-label">
          <span>${m.away.flag} ${m.away.name} 승 ${voted === 'away' ? '<span class="my-vote-badge">내 예측</span>' : ''}</span>
          <span class="pct">${pct.away}%</span>
        </div>
        <div class="bar-bg"><div class="bar-fill away" style="width:${pct.away}%"></div></div>
      </div>

      ${scoreText}

      <div class="share-row">
        <button class="btn-share-sm btn-share-link" onclick="sharePredict('${m.id}', '${voted}', '${m.home.name}', '${m.away.name}', '${m.home.flag}', '${m.away.flag}', ${pct.home}, ${pct.away})">
          🔗 예측 결과 공유하기
        </button>
      </div>
    </div>`;
}

// ─── 스코어 검증 ──────────────────────────────────────────
function onScoreInput(matchId, side, inputEl) {
  const outcome = selected[matchId];
  if (!outcome) return;
  const sh = document.getElementById(`sh-${matchId}`);
  const sa = document.getElementById(`sa-${matchId}`);
  // 무승부면 반대쪽 점수 자동 동기화
  if (outcome === 'draw') {
    if (side === 'home') sa.value = inputEl.value;
    else sh.value = inputEl.value;
  }
  checkScoreHint(matchId);
}

function checkScoreHint(matchId) {
  const outcome = selected[matchId];
  const hint = document.getElementById(`score-hint-${matchId}`);
  const sh = document.getElementById(`sh-${matchId}`);
  const sa = document.getElementById(`sa-${matchId}`);
  if (!hint || !sh || !sa) return true;

  const hv = sh.value, av = sa.value;
  sh.classList.remove('invalid');
  sa.classList.remove('invalid');
  hint.textContent = '';

  if (hv === '' || av === '') return true; // 입력 안 했으면 통과

  const h = parseInt(hv), a = parseInt(av);
  if (isNaN(h) || isNaN(a)) return true;

  if (outcome === 'draw' && h !== a) {
    hint.textContent = '⚠️ 무승부 선택 시 동점 스코어를 입력해야 해요 (예: 1:1)';
    sh.classList.add('invalid'); sa.classList.add('invalid');
    return false;
  }
  if (outcome === 'home' && h <= a) {
    hint.textContent = '⚠️ 홈팀 승리 선택 시 홈팀 스코어가 더 높아야 해요 (예: 2:1)';
    sh.classList.add('invalid'); sa.classList.add('invalid');
    return false;
  }
  if (outcome === 'away' && a <= h) {
    hint.textContent = '⚠️ 원정팀 승리 선택 시 원정팀 스코어가 더 높아야 해요 (예: 0:1)';
    sh.classList.add('invalid'); sa.classList.add('invalid');
    return false;
  }
  return true;
}

// ─── 선택 처리 ────────────────────────────────────────────
let selected = {};

function selectPick(matchId, outcome, btn) {
  selected[matchId] = outcome;
  const card = document.getElementById(`card-${matchId}`);
  card.querySelectorAll('.predict-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById(`submit-${matchId}`).disabled = false;

  // 무승부 선택 시 이미 입력된 스코어가 있으면 동기화
  const sh = document.getElementById(`sh-${matchId}`);
  const sa = document.getElementById(`sa-${matchId}`);
  if (sh && sa && outcome === 'draw' && sh.value !== '') {
    sa.value = sh.value;
  }
  checkScoreHint(matchId);
}

async function submitVote(matchId) {
  const outcome = selected[matchId];
  if (!outcome) return;

  const sh = document.getElementById(`sh-${matchId}`)?.value || '';
  const sa = document.getElementById(`sa-${matchId}`)?.value || '';

  // 스코어 입력했으면 일관성 검증
  if (sh !== '' && sa !== '') {
    if (!checkScoreHint(matchId)) return;
  }

  const submitBtn = document.getElementById(`submit-${matchId}`);
  submitBtn.disabled = true;
  submitBtn.textContent = '제출 중...';

  await castVote(matchId, outcome);

  setMyVote(matchId, { outcome, scoreHome: sh, scoreAway: sa });

  // 결과 불러와서 카드 재렌더
  const m = MATCHES.find(m => m.id === matchId);
  const votes = await getVotes(matchId);
  const pct = calcPct(votes);
  const myVote = parseMyVote(matchId);

  const card = document.getElementById(`card-${matchId}`);
  card.querySelector('.match-body').innerHTML =
    `<div class="vs-row">
      <div class="team-block"><span class="team-flag">${m.home.flag}</span><div class="team-name">${m.home.name}</div></div>
      <div class="vs-divider">VS</div>
      <div class="team-block"><span class="team-flag">${m.away.flag}</span><div class="team-name">${m.away.name}</div></div>
    </div>
    <div class="match-info"><strong>${m.dateKST}</strong><br>${m.venue}<br><span style="color:#f4c842;font-size:.78rem">${m.note}</span></div>
    ${renderResults(m, pct, outcome, myVote)}`;
  card.classList.add('voted');
}

function sharePredict(matchId, voted, homeName, awayName, homeFlag, awayFlag, homePct, awayPct) {
  const outcomeText = voted === 'home' ? `${homeFlag} ${homeName} 승리` :
                      voted === 'away' ? `${awayFlag} ${awayName} 승리` : '🤝 무승부';
  const text = `⚽ 내 예측: ${outcomeText}!\n현재 팬들 예측 — ${homeFlag} ${homePct}% vs ${awayFlag} ${awayPct}%\n\n당신의 예측은? 👇\nhttps://www.dreamingblog.com/blog/predict.html`;

  if (navigator.share) {
    navigator.share({ title: '2026 월드컵 경기 예측', text }).catch(() => copyText(text));
  } else {
    copyText(text);
  }
}

function copyText(text) {
  navigator.clipboard?.writeText(text).then(showToast) || (() => {
    const el = document.createElement('textarea');
    el.value = text; document.body.appendChild(el); el.select();
    document.execCommand('copy'); document.body.removeChild(el); showToast();
  })();
}

function showToast() {
  const t = document.getElementById('share-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── 초기화 ───────────────────────────────────────────────
async function init() {
  const container = document.getElementById('matches-container');
  container.innerHTML = MATCHES.map(() =>
    `<div class="match-card" style="padding:20px; text-align:center; color:#555">불러오는 중...</div>`
  ).join('');

  const allVotes = await Promise.all(MATCHES.map(m => getVotes(m.id)));

  container.innerHTML = MATCHES.map((m, i) => {
    const myVote = parseMyVote(m.id);
    return renderCard(m, allVotes[i], myVote);
  }).join('');
}

init();
</script>
