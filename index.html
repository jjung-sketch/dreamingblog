      --bg: #0d0d1a;
      --surface: #16182a;

    .header-left { display: flex; align-items: center; gap: 12px; }

    header h1 {

      -webkit-text-fill-color: transparent;

    .standings-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }

    .standings-table th {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      padding: 7px 8px;

    .standings-table th.team-th { text-align: left; padding-left: 12px; }

    .standings-table td {

      border-radius: 2px;

    /* Match cards */
    .section-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;

    .section-title { font-size: 1rem; font-weight: 700; }
    .count-badge {

    .matches-wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

      letter-spacing: 0.3px;
      border-top: 1px solid var(--border);

    }
    .day-label:first-child { border-top: none; padding-top: 0; }

    .match-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
    }

    .match-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .group-tag {
      background: var(--surface2);
      padding: 2px 9px;
      border-radius: 20px;
      font-weight: 600;
    }
    .round-tag { font-size: 0.68rem; }

    .match-body {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;

    .team-side { display: flex; align-items: center; gap: 8px; }
    .team-side.home { justify-content: flex-end; flex-direction: row-reverse; }
    .team-side.away { justify-content: flex-start; }

    .score-center { text-align: center; }

    .score-box {
      background: var(--surface2);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 1.35rem;
      font-weight: 800;
      letter-spacing: 4px;
      min-width: 82px;

    .score-box.upcoming {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 1px;
      min-width: 92px;
    }

    .loading, .error-state {
      text-align: center;
      padding: 60px 24px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { color: var(--muted); font-size: 0.9rem; }
    .error-state { color: var(--accent); }
    .error-state p { margin-top: 8px; font-size: 0.85rem; color: var(--muted); }
    .empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 0.9rem; }

    @media (max-width: 600px) {
      .groups-grid { grid-template-columns: 1fr; }
      header { padding: 14px 16px; }
      .tab-pane { padding: 16px; }
      .score-box { padding: 6px 10px; min-width: 70px; font-size: 1.1rem; }
      .team-side .tname { font-size: 0.82rem; }
    }

<script>
// ── Country name → ISO code for flag CDN ──
const ISO = {
  'Mexico':'mx','South Africa':'za','South Korea':'kr','Korea Republic':'kr',
  'Czech Republic':'cz','Czechia':'cz','Canada':'ca',
  'Bosnia and Herzegovina':'ba','Bosnia-Herzegovina':'ba',
  'USA':'us','United States':'us',
  'Germany':'de','Brazil':'br','Argentina':'ar','France':'fr','England':'gb-eng',
  'Spain':'es','Portugal':'pt','Netherlands':'nl','Belgium':'be','Switzerland':'ch',
  'Croatia':'hr','Italy':'it','Japan':'jp','Australia':'au','Morocco':'ma',
  'Senegal':'sn','Ghana':'gh','Nigeria':'ng','Ecuador':'ec','Uruguay':'uy',
  'Colombia':'co','Chile':'cl','Peru':'pe','Venezuela':'ve','Bolivia':'bo',
  'Paraguay':'py','Costa Rica':'cr','Panama':'pa','Honduras':'hn','Jamaica':'jm',
  'Trinidad and Tobago':'tt','Trinidad & Tobago':'tt',
  'New Zealand':'nz','Iran':'ir','Saudi Arabia':'sa','Qatar':'qa',
  'Turkey':'tr','Türkiye':'tr','Ukraine':'ua','Poland':'pl','Sweden':'se',
  'Denmark':'dk','Norway':'no','Scotland':'gb-sct','Wales':'gb-wls','Iceland':'is',
  'Serbia':'rs','Romania':'ro','Hungary':'hu','Slovakia':'sk','Austria':'at',
  'Greece':'gr','Albania':'al','Slovenia':'si','Georgia':'ge','Egypt':'eg',
  'Tunisia':'tn','Algeria':'dz','Cameroon':'cm',
  "Côte d'Ivoire":'ci',"Cote d'Ivoire":'ci','Ivory Coast':'ci',
  'DR Congo':'cd','Congo DR':'cd','Democratic Republic of Congo':'cd',
  'Mali':'ml','Tanzania':'tz','Zambia':'zm','Mozambique':'mz',
  'Cabo Verde':'cv','Cape Verde':'cv',
  'Thailand':'th','Indonesia':'id','Philippines':'ph',
  'China':'cn','Uzbekistan':'uz','Iraq':'iq','Bahrain':'bh',
  'Guatemala':'gt','El Salvador':'sv','Cuba':'cu','Haiti':'ht',
  'Dominican Republic':'do',
};

function flagUrl(name) {
  const code = ISO[name];
  return code ? `https://flagcdn.com/w40/${code}.png` : '';
}

// ── Time parsing & KST conversion ──
// openfootball format: "HH:MM UTC+X" or "HH:MM UTC-X"
function toKST(dateStr, timeStr) {
  if (!timeStr) return null;
  const tm = timeStr.match(/(\d+):(\d+)\s+UTC([+-]\d+)/);
  if (!tm) return null;
  const [, h, min, off] = tm.map(Number);
  const [y, m, d] = dateStr.split('-').map(Number);
  // Convert local → UTC → KST
  const utcMs = Date.UTC(y, m - 1, d, h - off, min);
  return new Date(utcMs + 9 * 3600000);
}

function fmtDate(d) {
  if (!d) return '';
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getUTCMonth()+1}월 ${d.getUTCDate()}일 (${days[d.getUTCDay()]})`;
}
function fmtTime(d) {
  if (!d) return '';
  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
}
function fmtKey(d) {
  if (!d) return 'x';
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}

// ── Data loading ──
const DATA_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

async function loadData() {
  const r = await fetch(DATA_URL);
  if (!r.ok) throw new Error(`데이터 로드 실패 (HTTP ${r.status})`);
  const json = await r.json();
  return json.matches || [];
}

// ── Standings calculation ──
function calcStandings(matches) {
  const groups = {};
  matches
    .filter(m => m.group)
    .forEach(m => {
      const g = m.group.replace('Group ', '');
      if (!groups[g]) groups[g] = {};

      const ensureTeam = (name) => {
        if (!groups[g][name]) groups[g][name] = { name, mp:0, w:0, d:0, l:0, gf:0, ga:0, pts:0 };
      };

      ensureTeam(m.team1); ensureTeam(m.team2);

      if (!m.score) return; // not played yet

      const [g1, g2] = m.score.ft;
      const t1 = groups[g][m.team1], t2 = groups[g][m.team2];
      t1.mp++; t2.mp++;
      t1.gf += g1; t1.ga += g2;
      t2.gf += g2; t2.ga += g1;

      if (g1 > g2)      { t1.w++; t1.pts += 3; t2.l++; }
      else if (g2 > g1) { t2.w++; t2.pts += 3; t1.l++; }
      else              { t1.d++; t1.pts++;     t2.d++; t2.pts++; }
    });

  const sorted = {};
  Object.entries(groups).sort(([a],[b]) => a.localeCompare(b)).forEach(([g, teams]) => {
    sorted[g] = Object.values(teams).sort((a, b) => {
      if (b.pts !== a.pts) return b.pts - a.pts;
      const gdDiff = (b.gf - b.ga) - (a.gf - a.ga);
      if (gdDiff !== 0) return gdDiff;
      return b.gf - a.gf;
    });
  });
  return sorted;
}

// ── Render helpers ──
function flagImg(name) {
  const src = flagUrl(name);
  if (!src) return '';
  return `<img class="flag-img" src="${src}" alt="${name}" onerror="this.style.display='none'">`;
}

function renderGroups(standings) {
  const el = document.getElementById('pane-groups');
  const entries = Object.entries(standings);
  if (!entries.length) { el.innerHTML = '<div class="empty-state">그룹 데이터가 없습니다.</div>'; return; }

  const cards = entries.map(([g, teams]) => {
    const rows = teams.map((t, i) => {
      const gd = t.gf - t.ga;
      const bg = i === 0 ? 'style="background:rgba(46,204,113,0.08)"'
               : i === 1 ? 'style="background:rgba(46,204,113,0.04)"'
               : i === 2 ? 'style="background:rgba(244,200,66,0.03)"' : '';
      return `<tr ${bg}>
        <td><span class="rank-num">${i+1}</span></td>
        <td><div class="team-cell">${flagImg(t.name)}<span>${t.name}</span></div></td>
        <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
        <td>${t.gf}</td><td>${t.ga}</td>
        <td>${gd > 0 ? '+'+gd : gd}</td>
        <td class="pts-cell">${t.pts}</td>
      </tr>`;
    }).join('');

    return `<div class="group-card">
      <div class="group-header">GROUP ${g}</div>
      <table class="standings-table">
        <thead><tr>
          <th></th><th class="team-th">국가</th>
          <th title="경기">P</th><th title="승">W</th><th title="무">D</th><th title="패">L</th>
          <th title="득점">GF</th><th title="실점">GA</th><th title="골득실">GD</th><th title="승점">PTS</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="groups-grid">${cards}</div>`;
}

function matchCard(m, showScore) {
  const kst = toKST(m.date, m.time);
  const groupLabel = m.group ? m.group : (m.round || '');
  const score = m.score ? `${m.score.ft[0]} : ${m.score.ft[1]}` : null;

  const scoreEl = showScore && score
    ? `<div class="score-box">${score}</div>`
    : `<div class="score-box upcoming">${kst ? fmtTime(kst) + ' KST' : (m.time || 'TBD')}</div>`;

  return `<div class="match-card">
    <div class="match-meta">
      <span class="group-tag">${groupLabel}</span>
      <span class="round-tag">${m.ground || ''}</span>
    </div>
    <div class="match-body">
      <div class="team-side home">
        <span class="tname">${m.team1}</span>${flagImg(m.team1)}
      </div>
      <div class="score-center">${scoreEl}</div>
      <div class="team-side away">
        ${flagImg(m.team2)}<span class="tname">${m.team2}</span>
      </div>
    </div>
  </div>`;
}

function groupByDay(matches, getKST) {
  const byDay = {};
  matches.forEach(m => {
    const kst = getKST(m);
    const key = kst ? fmtKey(kst) : 'x';
    const label = kst ? fmtDate(kst) : '날짜 미정';
    if (!byDay[key]) byDay[key] = { label, items: [] };
    byDay[key].items.push(m);
  });
  return byDay;
}

function renderResults(matches) {
  const el = document.getElementById('pane-results');
  const done = matches.filter(m => m.score).sort((a, b) => {
    const da = toKST(a.date, a.time), db = toKST(b.date, b.time);
    return (db ? db.getTime() : 0) - (da ? da.getTime() : 0);
  });
  if (!done.length) { el.innerHTML = '<div class="empty-state">아직 완료된 경기가 없습니다.</div>'; return; }

  const byDay = groupByDay(done, m => toKST(m.date, m.time));
  const html = Object.entries(byDay)
    .sort(([a],[b]) => b.localeCompare(a))
    .map(([, {label, items}]) =>
      `<div class="day-label">${label}</div>` + items.map(m => matchCard(m, true)).join('')
    ).join('');

  el.innerHTML = `<div class="section-meta">
    <span class="section-title">경기 결과</span>
    <span class="count-badge">총 ${done.length}경기</span>
  </div><div class="matches-wrap">${html}</div>`;
}

function renderSchedule(matches) {
  const el = document.getElementById('pane-schedule');
  const upcoming = matches.filter(m => !m.score).sort((a, b) => {
    const da = toKST(a.date, a.time), db = toKST(b.date, b.time);
    return (da ? da.getTime() : Infinity) - (db ? db.getTime() : Infinity);
  });
  if (!upcoming.length) { el.innerHTML = '<div class="empty-state">남은 경기가 없습니다. 🏆</div>'; return; }

  const byDay = groupByDay(upcoming, m => toKST(m.date, m.time));
  const html = Object.entries(byDay)
    .sort(([a],[b]) => a.localeCompare(b))
    .map(([, {label, items}]) =>
      `<div class="day-label">${label}</div>` + items.map(m => matchCard(m, false)).join('')
    ).join('');

  el.innerHTML = `<div class="section-meta">
    <span class="section-title">남은 일정</span>
    <span class="count-badge">총 ${upcoming.length}경기</span>
  </div><div class="matches-wrap">${html}</div>`;
}

// ── Tab switching ──
function switchTab(name, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`pane-${name}`).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── Init ──
async function init() {
  try {
    const matches = await loadData();
    const standings = calcStandings(matches);
    renderGroups(standings);
    renderResults(matches);
    renderSchedule(matches);

    const now = new Date();
    document.getElementById('update-time').textContent =
      `업데이트: ${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  } catch (err) {
    const msg = `<div class="error-state">⚠️ ${err.message}<p>새로고침하거나 잠시 후 다시 시도해 주세요.</p></div>`;
    ['pane-groups','pane-results','pane-schedule'].forEach(id => {
      document.getElementById(id).innerHTML = msg;
    });
  }
}

init();
setInterval(init, 5 * 60 * 1000); // 5분마다 자동 새로고침
</script>
